services:
  ocr:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "5000:5000"
    environment:
      OCR_SAVE_ENABLED: "1"
      OCR_SAVE_DIR: /data/ocr
      OMP_THREAD_LIMIT: "1"
    volumes:
      - ./ocr-data:/data/ocr
      - ./library-data:/data/library
    restart: unless-stopped
