<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Kindleish</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/reader.css">
</head>
<body class="theme-white">

  <!-- Loading screen -->
  <div id="reader-loading" class="reader-loading">
    <div class="spinner"></div>
    <p id="extract-progress" class="extract-progress">Loading book...</p>
    <button id="extract-cancel" class="extract-cancel hidden">Cancel</button>
  </div>

  <!-- Reading viewport -->
  <div id="viewport">
    <div id="content-container"></div>
  </div>

  <!-- Progress bar (always visible) -->
  <div class="progress-bar-track">
    <div id="progress-bar" class="progress-bar-fill" style="width: 0%"></div>
  </div>

  <!-- Top chrome bar -->
  <div id="top-bar" class="top-bar">
    <button class="top-bar-btn" id="back-btn" aria-label="Back to library">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <span id="book-title" class="top-bar-title"></span>
    <button class="top-bar-btn" id="bookmark-btn" aria-label="Bookmark">
      <svg class="bookmark-icon" id="bookmark-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  </div>

  <!-- Bottom chrome bar -->
  <div id="bottom-bar" class="bottom-bar">
    <div class="bottom-bar-info">
      <span id="page-info">Page 1 of 1</span>
      <span id="pct-info">0%</span>
    </div>
    <input type="range" id="progress-slider" class="progress-slider" min="1" max="1" value="1">
    <div class="bottom-bar-actions">
      <button class="settings-btn" id="settings-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.32 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        Settings
      </button>
    </div>
  </div>

  <!-- Settings panel (bottom sheet) -->
  <div id="settings-overlay" class="settings-overlay"></div>
  <div id="settings-panel" class="settings-panel">
    <div class="settings-handle"></div>

    <div class="setting-group">
      <div class="setting-label">Font Size</div>
      <div class="font-size-controls">
        <button class="font-size-btn" id="font-decrease">A-</button>
        <span class="font-size-value" id="font-size-value">18px</span>
        <button class="font-size-btn" id="font-increase">A+</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">Font</div>
      <div class="font-family-options">
        <button class="font-family-btn active" data-family="serif">Serif</button>
        <button class="font-family-btn" data-family="sans">Sans</button>
        <button class="font-family-btn" data-family="mono">Mono</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">Line Spacing</div>
      <div class="line-spacing-options">
        <button class="line-spacing-btn" data-spacing="1.4">Compact</button>
        <button class="line-spacing-btn active" data-spacing="1.6">Normal</button>
        <button class="line-spacing-btn" data-spacing="1.9">Relaxed</button>
      </div>
    </div>

    <div class="setting-group">
      <div class="setting-label">Theme</div>
      <div class="theme-options">
        <button class="theme-swatch active" data-theme="white">White</button>
        <button class="theme-swatch" data-theme="sepia">Sepia</button>
        <button class="theme-swatch" data-theme="dark">Dark</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/reader.js"></script>
</body>
</html>
